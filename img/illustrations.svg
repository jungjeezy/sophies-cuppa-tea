<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- 1. Single tea leaf, slightly curled with vein lines -->
  <symbol id="tea-leaf" viewBox="0 0 100 60">
    <g fill="none" stroke="#2a2420" stroke-linecap="round" stroke-linejoin="round">
      <!-- Leaf outline -->
      <path d="M12,45 C18,42 28,14 52,8 C68,4 88,10 92,18 C96,26 89,38 74,44 C58,50 32,52 18,48 C12,46 10,46 12,45Z" stroke-width="2"/>
      <!-- Central vein -->
      <path d="M16,44 C28,38 48,22 88,16" stroke-width="1.8"/>
      <!-- Side veins -->
      <path d="M38,36 C42,30 50,24 58,19" stroke-width="1.3"/>
      <path d="M52,40 C56,34 62,28 70,23" stroke-width="1.3"/>
      <path d="M28,40 C32,34 38,28 44,22" stroke-width="1.2"/>
      <path d="M64,38 C68,32 74,27 80,22" stroke-width="1.2"/>
    </g>
  </symbol>

  <!-- 2. Tea leaves cluster, 3-4 overlapping -->
  <symbol id="tea-leaves-cluster" viewBox="0 0 120 80">
    <g fill="none" stroke="#2a2420" stroke-linecap="round" stroke-linejoin="round">
      <!-- Leaf 1 (back, angled left) -->
      <path d="M14,58 C18,52 22,30 38,18 C48,10 62,8 66,14 C70,20 64,32 52,40 C40,48 24,54 16,56Z" stroke-width="1.8"/>
      <path d="M18,54 C28,44 40,28 62,14" stroke-width="1.4"/>
      <!-- Leaf 2 (middle, angled right) -->
      <path d="M42,68 C48,64 58,40 78,28 C90,20 106,18 110,24 C114,30 108,42 96,50 C82,58 56,66 46,66Z" stroke-width="2"/>
      <path d="M46,66 C60,54 74,38 108,26" stroke-width="1.5"/>
      <path d="M66,56 C72,48 80,40 88,34" stroke-width="1.2"/>
      <!-- Leaf 3 (front, pointing up) -->
      <path d="M34,72 C38,68 46,48 56,34 C62,26 72,18 78,16 C84,14 86,18 84,24 C82,32 72,44 60,54 C48,64 36,70 34,72Z" stroke-width="2.2"/>
      <path d="M36,70 C48,58 60,40 82,18" stroke-width="1.5"/>
      <!-- Leaf 4 (small, tucked behind) -->
      <path d="M58,72 C62,68 68,54 76,46 C82,40 90,36 94,38 C98,40 96,46 90,52 C84,58 68,68 60,72Z" stroke-width="1.6"/>
      <path d="M62,70 C72,60 80,48 92,40" stroke-width="1.2"/>
    </g>
  </symbol>

  <!-- 3. Small clay teapot (yixing style) -->
  <symbol id="teapot" viewBox="0 0 100 80">
    <g fill="none" stroke="#2a2420" stroke-linecap="round" stroke-linejoin="round">
      <!-- Body -->
      <path d="M28,34 C26,22 34,14 50,12 C66,10 76,18 76,30 C78,44 74,56 68,62 C60,68 42,68 34,62 C28,56 26,46 28,34Z" stroke-width="2.2"/>
      <!-- Lid -->
      <path d="M36,16 C38,10 46,6 52,6 C58,6 64,10 66,16" stroke-width="2"/>
      <!-- Knob on lid -->
      <path d="M48,6 C48,3 52,2 54,3 C56,4 56,7 54,8" stroke-width="1.8"/>
      <!-- Spout -->
      <path d="M76,30 C82,28 88,24 92,18 C93,16 94,14 92,13" stroke-width="2"/>
      <path d="M76,34 C84,32 90,28 93,20" stroke-width="1.8"/>
      <!-- Handle -->
      <path d="M28,28 C18,26 10,32 8,40 C6,48 10,56 18,58 C24,59 28,56 30,52" stroke-width="2.2"/>
      <!-- Base line -->
      <path d="M36,66 C42,70 58,70 66,66" stroke-width="1.8"/>
    </g>
  </symbol>

  <!-- 4. Small handleless tea cup (gaiwan style) with steam -->
  <symbol id="tea-cup" viewBox="0 0 60 70">
    <g fill="none" stroke="#2a2420" stroke-linecap="round" stroke-linejoin="round">
      <!-- Cup body -->
      <path d="M10,28 C8,36 10,48 14,54 C18,60 24,62 30,62 C36,62 42,60 46,54 C50,48 52,36 50,28" stroke-width="2"/>
      <!-- Rim -->
      <path d="M8,28 C8,24 18,22 30,22 C42,22 52,24 52,28 C52,32 42,30 30,30 C18,30 8,32 8,28Z" stroke-width="1.8"/>
      <!-- Saucer -->
      <path d="M6,62 C6,66 16,68 30,68 C44,68 54,66 54,62" stroke-width="2"/>
      <path d="M14,62 C14,64 20,65 30,65 C40,65 46,64 46,62" stroke-width="1.5"/>
      <!-- Steam wisps -->
      <path d="M22,20 C20,16 22,10 24,6" stroke-width="1.5" opacity="0.6"/>
      <path d="M30,18 C32,14 30,8 32,4" stroke-width="1.5" opacity="0.5"/>
      <path d="M38,20 C40,14 38,10 40,6" stroke-width="1.5" opacity="0.6"/>
    </g>
  </symbol>

  <!-- 5. Wispy steam curls -->
  <symbol id="steam" viewBox="0 0 40 80">
    <g fill="none" stroke="#2a2420" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12,78 C8,68 16,60 14,50 C12,42 6,38 10,28 C14,18 18,14 16,6" stroke-width="1.8" opacity="0.5"/>
      <path d="M22,76 C26,66 20,58 22,48 C24,38 30,34 28,24 C26,16 22,10 24,2" stroke-width="2" opacity="0.6"/>
      <path d="M32,78 C28,70 34,62 32,54 C30,46 36,40 34,32 C32,24 36,18 34,10" stroke-width="1.5" opacity="0.4"/>
    </g>
  </symbol>

  <!-- 6. Tea plant branch with leaves -->
  <symbol id="branch" viewBox="0 0 200 100">
    <g fill="none" stroke="#2a2420" stroke-linecap="round" stroke-linejoin="round">
      <!-- Main branch -->
      <path d="M8,82 C20,78 48,68 80,52 C112,36 148,22 180,14 C188,12 194,10 196,8" stroke-width="2.2"/>
      <!-- Small branches -->
      <path d="M40,72 C44,66 48,58 52,52" stroke-width="1.8"/>
      <path d="M90,46 C86,40 82,32 78,26" stroke-width="1.8"/>
      <path d="M130,30 C134,24 138,16 140,10" stroke-width="1.8"/>
      <!-- Leaf 1 (left) -->
      <path d="M30,74 C24,66 18,56 22,48 C26,40 36,42 40,50 C44,58 42,68 38,74Z" stroke-width="1.8"/>
      <path d="M28,72 C30,62 34,52 38,48" stroke-width="1.2"/>
      <!-- Leaf 2 (left-mid, top) -->
      <path d="M52,52 C48,44 52,32 60,28 C68,24 74,30 72,38 C70,46 62,54 56,56Z" stroke-width="1.8"/>
      <path d="M54,52 C58,42 64,34 70,30" stroke-width="1.2"/>
      <!-- Leaf 3 (mid, bottom) -->
      <path d="M78,56 C82,62 92,68 100,66 C108,64 110,56 104,50 C98,44 86,44 80,48Z" stroke-width="2"/>
      <path d="M80,54 C88,56 96,58 106,54" stroke-width="1.3"/>
      <!-- Leaf 4 (right-mid, top) -->
      <path d="M78,26 C72,18 74,8 82,4 C90,0 96,6 94,14 C92,22 84,28 80,28Z" stroke-width="1.8"/>
      <path d="M80,26 C82,18 86,10 92,6" stroke-width="1.2"/>
      <!-- Leaf 5 (right) -->
      <path d="M140,10 C146,4 156,0 164,2 C172,4 174,12 168,18 C162,24 148,24 142,20Z" stroke-width="1.8"/>
      <path d="M142,16 C150,12 158,8 166,6" stroke-width="1.2"/>
      <!-- Leaf 6 (far right, bottom) -->
      <path d="M160,24 C166,30 176,36 184,34 C192,32 194,24 188,18 C182,14 170,16 164,20Z" stroke-width="1.6"/>
      <path d="M164,22 C172,24 180,28 188,24" stroke-width="1.1"/>
    </g>
  </symbol>

  <!-- 7. Rough circle stamp/seal -->
  <symbol id="circle-stamp" viewBox="0 0 60 60">
    <g stroke="#2a2420" stroke-linecap="round" stroke-linejoin="round">
      <!-- Outer rough circle -->
      <path d="M30,4 C38,3 48,6 54,14 C60,22 58,32 56,38 C54,44 50,52 42,56 C34,60 24,58 18,54 C12,50 6,44 4,36 C2,28 4,18 10,12 C16,6 22,5 30,4Z" fill="#2a2420" fill-opacity="0.08" stroke-width="2.5"/>
      <!-- Inner rough circle -->
      <path d="M30,12 C36,11 44,14 48,20 C52,26 50,34 48,38 C46,42 42,48 36,50 C30,52 24,50 20,46 C16,42 12,38 12,32 C12,26 14,18 20,14 C24,12 28,12 30,12Z" fill="none" stroke-width="1.8"/>
    </g>
  </symbol>

  <!-- 8. Hand-drawn wavy line divider -->
  <symbol id="wave-divider" viewBox="0 0 400 20">
    <g fill="none" stroke="#2a2420" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2,10 C12,4 22,4 32,10 C42,16 52,16 62,10 C72,4 82,5 92,10 C102,15 112,16 122,10 C132,4 142,4 152,10 C162,16 172,15 182,10 C192,5 202,4 212,10 C222,16 232,16 242,10 C252,4 262,5 272,10 C282,15 292,16 302,10 C312,4 322,4 332,10 C342,16 352,15 362,10 C372,5 382,4 392,10 C396,12 398,12 400,11" stroke-width="2"/>
    </g>
  </symbol>

  <!-- 9. Mountain silhouette with mist -->
  <symbol id="tea-mountain" viewBox="0 0 300 100">
    <g fill="none" stroke="#2a2420" stroke-linecap="round" stroke-linejoin="round">
      <!-- Far mountain (lighter) -->
      <path d="M0,82 C10,80 30,60 52,42 C62,34 72,28 82,24 C88,22 92,22 96,24 C104,28 118,46 136,60 C148,70 160,78 180,82" stroke-width="1.5" opacity="0.4"/>
      <!-- Main mountain -->
      <path d="M40,90 C52,86 70,68 90,48 C104,34 116,22 128,14 C136,8 142,6 148,8 C156,12 168,26 184,44 C200,62 220,78 240,86 C252,90 264,92 280,92" stroke-width="2.2"/>
      <!-- Small foreground hill -->
      <path d="M180,92 C190,88 204,78 218,68 C228,62 236,58 242,56 C248,54 252,56 256,58 C264,64 272,74 284,82 C292,88 298,92 300,94" stroke-width="1.8" opacity="0.7"/>
      <!-- Mist layer 1 -->
      <path d="M20,72 C40,68 60,70 80,68 C100,66 120,62 140,64 C160,66 180,70 200,68" stroke-width="1.5" opacity="0.25"/>
      <!-- Mist layer 2 -->
      <path d="M60,80 C80,78 100,76 120,78 C140,80 160,76 180,74 C200,72 220,76 240,78" stroke-width="1.5" opacity="0.2"/>
      <!-- Small trees/texture on mountain -->
      <path d="M108,36 C110,32 112,30 114,32" stroke-width="1.2" opacity="0.5"/>
      <path d="M120,28 C122,24 124,22 126,24" stroke-width="1.2" opacity="0.5"/>
      <path d="M136,20 C138,16 140,14 142,16" stroke-width="1.2" opacity="0.5"/>
      <path d="M154,26 C156,22 158,20 160,22" stroke-width="1.2" opacity="0.5"/>
      <path d="M168,36 C170,32 172,30 174,32" stroke-width="1.2" opacity="0.5"/>
    </g>
  </symbol>

  <!-- 10. Scattered dots like tea dust -->
  <symbol id="dot-pattern" viewBox="0 0 100 100">
    <g fill="#2a2420" stroke="none">
      <circle cx="12" cy="18" r="1.8" opacity="0.7"/>
      <circle cx="34" cy="8" r="1.2" opacity="0.5"/>
      <circle cx="56" cy="14" r="2" opacity="0.6"/>
      <circle cx="78" cy="6" r="1.4" opacity="0.4"/>
