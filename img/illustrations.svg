      <circle cx="16" cy="62" r="1.6" opacity="0.6"/>
      <circle cx="38" cy="56" r="1.4" opacity="0.4"/>
      <circle cx="58" cy="64" r="2" opacity="0.7"/>
      <circle cx="74" cy="58" r="1.8" opacity="0.5"/>
      <circle cx="94" cy="66" r="1.4" opacity="0.6"/>
