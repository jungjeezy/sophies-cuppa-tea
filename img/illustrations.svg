      <circle cx="28" cy="78" r="1.6" opacity="0.7"/>
      <circle cx="44" cy="86" r="1.2" opacity="0.4"/>
      <circle cx="66" cy="82" r="1.8" opacity="0.6"/>
      <circle cx="82" cy="76" r="2.2" opacity="0.5"/>
      <circle cx="96" cy="90" r="1.4" opacity="0.7"/>
      <circle cx="18" cy="94" r="1.6" opacity="0.5"/>
      <circle cx="52" cy="92" r="1.4" opacity="0.6"/>
      <circle cx="72" cy="96" r="1.8" opacity="0.4"/>
      <circle cx="40" cy="48" r="1.2" opacity="0.3"/>
      <circle cx="62" cy="50" r="1" opacity="0.35"/>
